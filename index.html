<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>
		웹인터 기말
	</title>

	<style>
		 /* 기본 스타일 초기화 및 스크롤 방지 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden; /* 잉여 스크롤 공간 차단 */
            background-color: #a6f966; /* 이미지와 유사한 네온 그린/연두색 배경 */
            cursor: none; /* 기본 마우스 커서 숨김 */
        }

        /* 전체 레이아웃 구성을 위한 컨테이너 */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10vh 8vw;
            position: relative;
        }

        /* 메인 링크 텍스트 영역 (상단~중앙 배치) */
        .main-link-wrap {
            text-align: center;
            margin-top: 10vh;
        }

        .main-link {
            font-size: clamp(4.5rem, 10vw, 8rem); /* 화면 크기에 맞게 폰트 조절 */
            font-weight: 900;
            color: #0033ff; /* 선명한 파란색 */
            text-decoration: underline;
            text-underline-offset: 20px;
            text-decoration-thickness: 12px;
            transition: color 0.2s ease, transform 0.1s ease;
            display: inline-block;
        }

        /* 호버링 시 컬러 변경 및 살짝 커지는 효과 */
        .main-link:hover {
            color: #ffffff; /* 호버 시 색 변경 */
            transform: scale(1.02);
        }

        /* 하단 경고 문구 영역 */
        .warning-text {
            font-size: clamp(2rem, 4vw, 3.5rem);
            font-weight: 800;
            line-height: 1.4;
            color: #000000;
            margin-bottom: 5vh;
            text-align: left;
        }

        /* 커스텀 마우스 커서 전체 컨테이너 */
        #custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: auto;
            height: auto;
            pointer-events: none; /* 커서가 클릭 이벤트를 방해하지 않도록 설정 */
            z-index: 9999;
            transform: translate(0, 0); /* 마우스 포인터 끝점이 정확히 맞도록 조정 */
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* 커서 위에 따라다니는 작은 글씨 */
        .cursor-text {
            font-size: 18px;
            font-weight: 600;
            color: #000000;
            margin-bottom: 4px;
            white-space: nowrap;
            padding-left: 25px; /* 화살표 포인터 위쪽에 위치하도록 패딩 조절 */
        }

        /* 거대한 마우스 화살표 (SVG) */
        .cursor-arrow {
            width: 120px; /* 대형 커서 크기 조절 */
            height: auto;
        }
	</style>
</head>

<body>

<div class="container">
        <div class="main-link-wrap">
    <a href="./v2/index.html" class="main-link" id="next-page-btn">이 웹사이트를 클릭</a>
	</div>

        <div class="warning-text">
            하는 순간<br>
            당신의 개인정보는<br>
            유출됩니다.
        </div>
    </div>

  <div id="custom-cursor">
    <div class="cursor-text">클릭하세요..</div>
    <img src="cursur.png" class="cursor-arrow" alt="커서">
</div>
 <script>
        const cursor = document.getElementById('custom-cursor');

        // 마우스 움직임에 따라 커스텀 커서 위치 업데이트
        document.addEventListener('mousemove', (e) => {
            window.requestAnimationFrame(() => {
                cursor.style.left = `${e.clientX}px`;
                cursor.style.top = `${e.clientY}px`;
            });
        });
    </script>
  
</body>

</body>
</html>
